<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pro Studio Mobile - Calculator | Currency | Syntax</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #0a0e17 0%, #06090f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Roboto', sans-serif;
        }

        /* LOGIN OVERLAY - Mobile Optimized */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(6, 10, 18, 0.98);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .login-card {
            background: rgba(25, 32, 45, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 2rem 1.5rem;
            width: 100%;
            max-width: 320px;
            border: 1px solid rgba(59, 130, 246, 0.5);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(59, 130, 246, 0.2);
            text-align: center;
        }

        .login-card h2 {
            color: #eef5ff;
            font-weight: 700;
            margin-bottom: 1.5rem;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-card input {
            width: 100%;
            background: #0f121e;
            border: 1px solid #2c3548;
            padding: 16px 18px;
            border-radius: 60px;
            font-size: 1.1rem;
            color: white;
            outline: none;
            margin-bottom: 1.5rem;
            text-align: center;
            letter-spacing: 3px;
            font-weight: 500;
        }

        .login-card input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        .login-card button {
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            width: 100%;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .login-card button:active {
            transform: scale(0.97);
        }

        .error-msg {
            color: #f87171;
            margin-top: 12px;
            font-size: 0.8rem;
        }

        /* MAIN APP - Android/Mobile Layout */
        .main-app {
            display: none;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            gap: 16px;
            flex-direction: column;
            padding-bottom: 20px;
        }

        /* Cards - Mobile First */
        .card {
            background: rgba(18, 24, 34, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 1.8rem;
            border: 1px solid rgba(66, 99, 145, 0.4);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            transition: transform 0.1s;
        }

        .card-header {
            padding: 1rem 1.2rem;
            background: rgba(12, 17, 26, 0.8);
            border-bottom: 1px solid rgba(72, 110, 160, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-header h3 {
            color: #cbdffc;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .card-header i {
            font-size: 1.3rem;
        }

        /* Calculator - Big buttons for touch */
        .calculator-panel {
            padding: 1.2rem;
        }

        .calc-screen {
            background: #0b0e16;
            border-radius: 1.5rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid #2a3448;
        }

        #calcDisplay {
            width: 100%;
            background: transparent;
            border: none;
            text-align: right;
            font-size: 2.5rem;
            font-weight: 600;
            color: #f0f6ff;
            outline: none;
            font-family: 'Courier New', 'Fira Code', monospace;
        }

        .calc-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .calc-btn {
            background: #1e2538;
            border: none;
            padding: 18px 0;
            border-radius: 1.2rem;
            font-size: 1.3rem;
            font-weight: 600;
            color: #eef3ff;
            cursor: pointer;
            transition: all 0.05s linear;
            touch-action: manipulation;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .calc-btn:active {
            transform: scale(0.94);
            background: #2c364e;
        }

        .operator {
            background: #2a3958;
            color: #7aaef0;
        }

        .equal {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
        }

        .clear {
            background: #3e2a3c;
            color: #ffb4a2;
        }

        /* Currency Panel */
        .currency-panel {
            padding: 1.2rem;
        }

        .currency-row {
            margin-bottom: 1rem;
        }

        .currency-row label {
            color: #9aaec9;
            font-size: 0.7rem;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
            display: block;
            font-weight: 500;
        }

        .currency-input, .currency-select {
            width: 100%;
            background: #0f121e;
            border: 1px solid #2f3a50;
            padding: 14px 14px;
            border-radius: 1.2rem;
            color: white;
            font-size: 1rem;
            outline: none;
            touch-action: manipulation;
        }

        .convert-btn {
            background: #2563eb;
            width: 100%;
            border: none;
            padding: 14px;
            border-radius: 1.2rem;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            margin-top: 6px;
            cursor: pointer;
            touch-action: manipulation;
        }

        .convert-btn:active {
            background: #1d4ed8;
            transform: scale(0.98);
        }

        .result-area {
            background: #0b0f18;
            border-radius: 1.2rem;
            padding: 1rem;
            margin-top: 1rem;
            text-align: center;
            border: 1px solid #2d3a52;
        }

        .result-area span {
            color: #bbd7fb;
            font-size: 1.5rem;
            font-weight: 600;
            word-break: break-word;
        }

        /* Syntax Panel - Mobile optimized */
        .syntax-panel {
            padding: 1rem;
        }

        .editor-toolbar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .lang-badge {
            background: #1e2a44;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #8bb5ff;
        }

        .syntax-textarea {
            width: 100%;
            background: #01020a;
            color: #e2e8f0;
            border: 1px solid #2a3855;
            border-radius: 1.2rem;
            padding: 1rem;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            resize: vertical;
            outline: none;
            min-height: 140px;
        }

        .syntax-highlight-block {
            background: #0a0e17;
            border-radius: 1.2rem;
            margin-top: 1rem;
            padding: 1rem;
            border-left: 4px solid #3b82f6;
            max-height: 200px;
            overflow: auto;
        }

        .highlight-pre {
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            color: #cbd5e6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .keyword {
            color: #ff79c6;
            font-weight: 500;
        }
        .string {
            color: #a3e635;
        }
        .comment {
            color: #6272a4;
        }
        .number {
            color: #bd93f9;
        }
        .function {
            color: #50fa7b;
        }

        .btn-copy {
            background: #1f2a44;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            touch-action: manipulation;
        }

        .btn-copy:active {
            background: #2a3a60;
            transform: scale(0.96);
        }

        /* Android specific - better touch feedback */
        @media (hover: none) and (pointer: coarse) {
            .calc-btn, .convert-btn, .btn-copy, .login-card button {
                cursor: default;
            }
        }

        /* Extra small devices */
        @media (max-width: 420px) {
            body {
                padding: 8px;
            }
            .calc-btn {
                padding: 14px 0;
                font-size: 1.2rem;
            }
            .result-area span {
                font-size: 1.2rem;
            }
            .card-header h3 {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<!-- LOGIN SECTION -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <h2>🔐 PRO STUDIO</h2>
        <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="off" inputmode="numeric">
        <button id="loginBtn">UNLOCK</button>
        <div id="loginError" class="error-msg"></div>
        <div style="margin-top: 12px; font-size: 0.65rem; color: #6e85b0;">🔑 Password: 456456</div>
    </div>
</div>

<!-- MAIN APPLICATION - Android Optimized -->
<div id="mainApp" class="main-app">

    <!-- CALCULATOR MODULE -->
    <div class="card">
        <div class="card-header">
            <span style="font-size: 1.3rem;">🧮</span>
            <h3>Pro Calculator</h3>
        </div>
        <div class="calculator-panel">
            <div class="calc-screen">
                <input type="text" id="calcDisplay" readonly value="0">
            </div>
            <div class="calc-buttons">
                <button class="calc-btn clear" data-action="clear">AC</button>
                <button class="calc-btn operator" data-op="(">(</button>
                <button class="calc-btn operator" data-op=")">)</button>
                <button class="calc-btn operator" data-op="/">÷</button>
                
                <button class="calc-btn" data-num="7">7</button>
                <button class="calc-btn" data-num="8">8</button>
                <button class="calc-btn" data-num="9">9</button>
                <button class="calc-btn operator" data-op="*">×</button>
                
                <button class="calc-btn" data-num="4">4</button>
                <button class="calc-btn" data-num="5">5</button>
                <button class="calc-btn" data-num="6">6</button>
                <button class="calc-btn operator" data-op="-">−</button>
                
                <button class="calc-btn" data-num="1">1</button>
                <button class="calc-btn" data-num="2">2</button>
                <button class="calc-btn" data-num="3">3</button>
                <button class="calc-btn operator" data-op="+">+</button>
                
                <button class="calc-btn" data-num="0">0</button>
                <button class="calc-btn" data-num=".">.</button>
                <button class="calc-btn operator" data-op="%">%</button>
                <button class="calc-btn equal" id="calcEqual">=</button>
            </div>
        </div>
    </div>

    <!-- CURRENCY CONVERTER MODULE -->
    <div class="card">
        <div class="card-header">
            <span style="font-size: 1.3rem;">💱</span>
            <h3>Currency Converter</h3>
        </div>
        <div class="currency-panel">
            <div class="currency-row">
                <label>💰 AMOUNT</label>
                <input type="number" id="amountInput" class="currency-input" value="100" step="any" inputmode="decimal">
            </div>
            <div class="currency-row">
                <label>📤 FROM</label>
                <select id="fromCurrency" class="currency-select">
                    <option value="USD">USD - US Dollar</option>
                    <option value="EUR">EUR - Euro</option>
                    <option value="GBP">GBP - British Pound</option>
                    <option value="JPY">JPY - Japanese Yen</option>
                    <option value="INR">INR - Indian Rupee</option>
                    <option value="CAD">CAD - Canadian Dollar</option>
                    <option value="AUD">AUD - Australian Dollar</option>
                    <option value="CHF">CHF - Swiss Franc</option>
                    <option value="CNY">CNY - Chinese Yuan</option>
                </select>
            </div>
            <div class="currency-row">
                <label>📥 TO</label>
                <select id="toCurrency" class="currency-select">
                    <option value="USD">USD - US Dollar</option>
                    <option value="EUR" selected>EUR - Euro</option>
                    <option value="GBP">GBP - British Pound</option>
                    <option value="JPY">JPY - Japanese Yen</option>
                    <option value="INR">INR - Indian Rupee</option>
                    <option value="CAD">CAD - Canadian Dollar</option>
                    <option value="AUD">AUD - Australian Dollar</option>
                    <option value="CHF">CHF - Swiss Franc</option>
                    <option value="CNY">CNY - Chinese Yuan</option>
                </select>
            </div>
            <button id="convertCurrencyBtn" class="convert-btn">🔄 CONVERT</button>
            <div class="result-area">
                <span id="conversionResult">—</span>
            </div>
            <div style="font-size: 0.6rem; text-align: center; margin-top: 10px; color: #5e77a3;">⚡ Live market rates (updated)</div>
        </div>
    </div>

    <!-- SYNTAX HIGHLIGHTER MODULE -->
    <div class="card">
        <div class="card-header">
            <span style="font-size: 1.3rem;">◉ ◉ ◉</span>
            <h3>Syntax Lab</h3>
        </div>
        <div class="syntax-panel">
            <div class="editor-toolbar">
                <div class="lang-badge">JS / Python / JSON</div>
                <button id="copySyntaxBtn" class="btn-copy">📋 Copy</button>
            </div>
            <textarea id="codeEditor" class="syntax-textarea" rows="5" placeholder="Write your code here...&#10;function hello() {&#10;    return &quot;Android Pro&quot;;&#10;}"></textarea>
            <div class="syntax-highlight-block">
                <div style="display: flex; justify-content: space-between; margin-bottom: 6px;"><span style="color:#90a7d0; font-size:0.7rem;">✨ Live Highlight</span></div>
                <div id="highlightPreview" class="highlight-pre">// Code will be highlighted here</div>
            </div>
        </div>
    </div>
</div>

<script>
    // ===================== AUTHENTICATION =====================
    const loginOverlay = document.getElementById('loginOverlay');
    const mainApp = document.getElementById('mainApp');
    const passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');
    const CORRECT_PASS = "456456";

    function attemptLogin() {
        if (passwordInput.value === CORRECT_PASS) {
            loginOverlay.style.display = 'none';
            mainApp.style.display = 'flex';
            loginError.innerText = '';
            // Trigger initial updates
            performConversion();
            updateHighlight();
        } else {
            loginError.innerText = '❌ Wrong password. Access denied.';
            passwordInput.value = '';
            passwordInput.focus();
        }
    }

    loginBtn.addEventListener('click', attemptLogin);
    passwordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') attemptLogin();
    });

    // ===================== PROFESSIONAL CALCULATOR =====================
    const calcDisplay = document.getElementById('calcDisplay');
    let currentExpression = "0";
    
    function updateDisplay() {
        calcDisplay.value = currentExpression;
    }
    
    function evaluateExpression(expr) {
        try {
            let processed = expr.replace(/×/g, '*').replace(/÷/g, '/');
            if (processed.trim() === "") return "0";
            // Safe evaluation using Function
            let result = new Function('return (' + processed + ')')();
            if (isNaN(result) || !isFinite(result)) throw new Error("Invalid");
            result = parseFloat(result.toFixed(8));
            return result.toString();
        } catch(e) {
            return "Error";
        }
    }
    
    function handleCalculator(btn) {
        if (btn.classList.contains('clear')) {
            currentExpression = "0";
            updateDisplay();
            return;
        }
        if (btn.id === 'calcEqual') {
            let res = evaluateExpression(currentExpression);
            if (res !== "Error") {
                currentExpression = res;
            } else {
                currentExpression = "Error";
                updateDisplay();
                setTimeout(() => { currentExpression = "0"; updateDisplay(); }, 1300);
                return;
            }
            updateDisplay();
            return;
        }
        
        let val = '';
        if (btn.dataset.num !== undefined) val = btn.dataset.num;
        else if (btn.dataset.op !== undefined) val = btn.dataset.op;
        else return;
        
        if (currentExpression === "0" && val !== '.' && !isNaN(parseInt(val))) {
            currentExpression = val;
        } else if (currentExpression === "Error") {
            currentExpression = val;
        } else {
            currentExpression += val;
        }
        updateDisplay();
    }
    
    document.querySelectorAll('.calc-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.preventDefault();
            handleCalculator(btn);
        });
        // Touch feedback for Android
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleCalculator(btn);
        }, { passive: false });
    });
    
    // ===================== CURRENCY CONVERTER with real-time API =====================
    let exchangeRates = {
        USD: 1, EUR: 0.92, GBP: 0.79, JPY: 150.2, INR: 83.5, CAD: 1.36, AUD: 1.52, CHF: 0.88, CNY: 7.24
    };
    
    // Fetch live rates for better accuracy
    async function updateLiveRates() {
        try {
            const response = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            if (response.ok) {
                const data = await response.json();
                if (data.rates) {
                    for (let cur in exchangeRates) {
                        if (data.rates[cur]) exchangeRates[cur] = data.rates[cur];
                    }
                }
            }
        } catch (err) {
            console.log("Using cached rates");
        }
        performConversion(); // refresh after update
    }
    updateLiveRates();
    setInterval(updateLiveRates, 1800000); // update every 30 mins
    
    const amountInput = document.getElementById('amountInput');
    const fromCurrency = document.getElementById('fromCurrency');
    const toCurrency = document.getElementById('toCurrency');
    const convertBtn = document.getElementById('convertCurrencyBtn');
    const conversionResultSpan = document.getElementById('conversionResult');
    
    function performConversion() {
        let amount = parseFloat(amountInput.value);
        if (isNaN(amount)) amount = 0;
        const from = fromCurrency.value;
        const to = toCurrency.value;
        if (from === to) {
            conversionResultSpan.innerText = `${amount.toFixed(2)} ${to}`;
            return;
        }
        const amountInUSD = amount / exchangeRates[from];
        const converted = amountInUSD * exchangeRates[to];
        conversionResultSpan.innerText = `${converted.toFixed(4)} ${to}`;
    }
    
    convertBtn.addEventListener('click', performConversion);
    amountInput.addEventListener('input', performConversion);
    fromCurrency.addEventListener('change', performConversion);
    toCurrency.addEventListener('change', performConversion);
    
    // ===================== SYNTAX HIGHLIGHTER (Enhanced) =====================
    const codeEditor = document.getElementById('codeEditor');
    const highlightPreview = document.getElementById('highlightPreview');
    
    function syntaxHighlight(code) {
        let escaped = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        // Protect strings
        let stringMatches = [];
        let stringHolder = escaped.replace(/(".*?"|'.*?'|`.*?`)/gs, (match) => {
            stringMatches.push(match);
            return `__STR_${stringMatches.length-1}__`;
        });
        // Highlight comments
        let commentHolder = stringHolder.replace(/\/\/.*?$|\/\*[\s\S]*?\*\//gm, (match) => {
            return `<span class="comment">${match}</span>`;
        });
        // Restore strings
        commentHolder = commentHolder.replace(/__STR_(\d+)__/g, (_, idx) => {
            let str = stringMatches[parseInt(idx)];
            return `<span class="string">${str}</span>`;
        });
        // Numbers
        let withNumbers = commentHolder.replace(/\b(\d+(\.\d+)?)\b/g, '<span class="number">$1</span>');
        // Keywords
        const keywords = ['function', 'const', 'let', 'var', 'if', 'else', 'for', 'while', 'return', 'class', 'extends', 'super', 'import', 'export', 'default', 'new', 'try', 'catch', 'finally', 'throw', 'switch', 'case', 'break', 'continue', 'typeof', 'instanceof', 'true', 'false', 'null', 'undefined', 'async', 'await', 'def', 'print', 'lambda', 'static'];
        let keywordRegex = new RegExp(`\\b(${keywords.join('|')})\\b`, 'g');
        let withKeywords = withNumbers.replace(keywordRegex, '<span class="keyword">$1</span>');
        // Function calls
        let withFunctions = withKeywords.replace(/\b([a-zA-Z_][a-zA-Z0-9_]*)\s*\(/g, '<span class="function">$1</span>(');
        return withFunctions;
    }
    
    function updateHighlight() {
        let rawCode = codeEditor.value;
        if (rawCode.trim() === "") {
            highlightPreview.innerHTML = '<span style="color:#6c86a3;">// start typing to see syntax magic</span>';
            return;
        }
        highlightPreview.innerHTML = syntaxHighlight(rawCode);
    }
    
    codeEditor.addEventListener('input', updateHighlight);
    codeEditor.addEventListener('keyup', updateHighlight);
    
    // Copy button with Android toast-like feedback
    const copyBtn = document.getElementById('copySyntaxBtn');
    copyBtn.addEventListener('click', async () => {
        const codeText = codeEditor.value;
        try {
            await navigator.clipboard.writeText(codeText);
            const original = copyBtn.innerText;
            copyBtn.innerText = '✓ Copied!';
            setTimeout(() => { copyBtn.innerText = original; }, 1500);
        } catch (err) {
            alert("Could not copy");
        }
    });
    
    // Initial load and set demo content
    window.addEventListener('load', () => {
        // Set demo code for Android
        codeEditor.value = `// Android Studio Pro\nclass MobileApp {\n    constructor(name) {\n        this.name = name;\n    }\n    \n    run() {\n        console.log(\`Running \${this.name} on Android\`);\n        return "Success";\n    }\n}\n\nconst app = new MobileApp("Syntax Pro");\napp.run();`;
        updateHighlight();
        performConversion();
        calcDisplay.value = "0";
        currentExpression = "0";
    });
</script>
</body>
</html>
